<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>生成图标</title></head>
<body>
<p>将此页面在浏览器中打开，会自动生成图标PNG文件下载。</p>
<canvas id="c" style="display:none"></canvas>
<script>
function downloadPNG(size, filename) {
  const canvas = document.getElementById('c');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // 渐变背景
  const gradient = ctx.createLinearGradient(0, 0, size, size);
  gradient.addColorStop(0, '#667eea');
  gradient.addColorStop(1, '#764ba2');

  const r = size * 0.15;
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  ctx.font = size * 0.45 + 'px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\uD83D\uDCDA', size / 2, size * 0.35);

  ctx.fillStyle = 'white';
  ctx.font = 'bold ' + size * 0.2 + 'px Arial';
  ctx.fillText('搜题', size / 2, size * 0.72);

  canvas.toBlob(function(blob) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  });
}

setTimeout(() => {
  downloadPNG(16, 'icon16.png');
}, 500);
setTimeout(() => {
  downloadPNG(48, 'icon48.png');
}, 1500);
setTimeout(() => {
  downloadPNG(128, 'icon128.png');
}, 2500);
</script>
</body>
</html>
