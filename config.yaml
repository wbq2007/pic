# 抖音自动化配置
# 个人研究用途，请遵守相关法律法规和服务条款

# 关键词列表（用于匹配评论）
keywords:
  - "女权主义"
  - "女权"
  - "表情包里带有女权主义"
  - "极端女权"
  - "女拳"

# 举报理由（可选）
report_reasons:
  - "垃圾营销"
  - "不实信息"
  - "违规内容"
  - "其他"

# 自动化设置
settings:
  headless: true  # 是否使用无头模式
  timeout: 30      # 超时时间（秒）
  max_videos: 10   # 最大处理视频数
  scroll_count: 5  # 滚动加载次数

# 浏览器设置
browser:
  user_agent: "Mozilla/5.0 (iPhone; CPU iPhone OS 14_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/14.0 Mobile/15E148 Safari/604.1"
  viewport:
    width: 390
    height: 844
  device_scale_factor: 3

# 路径设置
paths:
  auth_state: "auth_state.json"
  cookies: "cookies.pkl"
  logs: "logs/"

# 安全设置
safety:
  rate_limit: 2    # 操作间隔（秒）
  max_retries: 3   # 最大重试次数
  enable_safety: true
